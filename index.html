<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Roop</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="stage">
    <main id="landing" class="screen active">
      <div class="kanji">間</div>
      <h1>Stay for a while.</h1>
      <p>Something meaningful is quietly taking shape.</p>
      <button id="play" class="btn btn-primary">Play</button>
    </main>

    <section id="game" class="screen" hidden>
      <button id="back" class="btn-icon" aria-label="Back to home">←</button>
      <div id="status" class="status" aria-live="polite">○ Turn</div>
      <div class="board-wrap">
        <div id="board"></div>
        <svg id="winLine" viewBox="0 0 282 282"><path/></svg>
      </div>
      <button id="reset" class="btn">Restart</button>
    </section>
  </div>

  <script src="script.js"></script>
</body>
</html>
